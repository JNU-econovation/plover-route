name: Route Engine CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'route-engine/**'
      - '.github/workflows/route-cd.yml'

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EC2_HOST: ${{ secrets.ROUTE_EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.ROUTE_EC2_SSH_KEY }}
        run: |
          MISSING=()
          for VAR in DOCKER_HUB_USERNAME DOCKER_HUB_TOKEN DB_URL DB_USER DB_PASSWORD EC2_HOST EC2_SSH_KEY; do
            if [ -z "${!VAR}" ]; then
              MISSING+=("$VAR")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Error: Missing secrets - ${MISSING[*]}"
            exit 1
          fi

  build-and-push:
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up JDK 21 & Gradle Cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./route-engine
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/geoai-route-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/geoai-route-engine:latest
        with:
          host: ${{ secrets.ROUTE_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.ROUTE_EC2_SSH_KEY }}
          envs: DB_URL,DB_USER,DB_PASSWORD,APP_IMAGE
          script: |
            cd ~/plover-route
            git pull origin main
            
            cd route-engine
            
            cat > .env <<EOF
            DB_URL=${DB_URL}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            APP_IMAGE=${APP_IMAGE}
            EOF
            
            docker compose pull route-engine
            docker compose up -d
            docker image prune -f
