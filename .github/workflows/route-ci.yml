name: Route Engine CI

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'route-engine/**'
      - '.github/workflows/route-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: route-engine

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests
      run: ./gradlew test --no-daemon

    - name: Verify Build
      run: ./gradlew bootJar --no-daemon
