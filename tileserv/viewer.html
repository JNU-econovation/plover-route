<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plover Spatial GeoAI Vector Tile Viewer</title>
    <!-- MapLibre GL JS CSS & JS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: #0c0f1d;
            color: #f1f3f9;
            overflow: hidden;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }
        /* Glassmorphism Control Panel */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 15, 29, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .control-panel h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #ff7b00, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .control-panel p {
            font-size: 13px;
            color: #9ea4b0;
            line-height: 1.5;
            margin: 0 0 20px 0;
        }
        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 16px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .connection-status {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .status-online .status-dot {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }
        /* Dynamic HUD Specs */
        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .hud-label {
            color: #8c94a6;
        }
        .hud-value {
            font-weight: 600;
            color: #f1f3f9;
        }
        .lod-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .lod-coarse {
            background: rgba(255, 153, 0, 0.15);
            color: #ff9900;
            border: 1px solid rgba(255, 153, 0, 0.3);
        }
        .lod-mid {
            background: rgba(51, 204, 255, 0.15);
            color: #33ccff;
            border: 1px solid rgba(51, 204, 255, 0.3);
        }
        .lod-fine {
            background: rgba(255, 51, 102, 0.15);
            color: #ff3366;
            border: 1px solid rgba(255, 51, 102, 0.3);
        }
        /* Custom Popup Styling */
        .maplibregl-popup-content {
            background: rgba(12, 15, 29, 0.9) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px !important;
            padding: 16px !important;
            color: #f1f3f9 !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4) !important;
        }
        .maplibregl-popup-anchor-top .maplibregl-popup-tip {
            border-bottom-color: rgba(12, 15, 29, 0.9) !important;
        }
        .maplibregl-popup-anchor-bottom .maplibregl-popup-tip {
            border-top-color: rgba(12, 15, 29, 0.9) !important;
        }
        .popup-title {
            font-size: 11px;
            color: #8c94a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .popup-score {
            font-size: 24px;
            font-weight: 600;
            color: #ff3366;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <h1>GeoAI Hotspots</h1>
        <p>141만 개 Gwangju 핫스팟 데이터를 H3 대형/중형 육각형 격자와 12m 무테두리 초정밀 H3 Res 11 격자의 다단계 해상도(LOD)로 관측하는 프리미엄 대시보드입니다.</p>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
            <div class="connection-status status-online">
                <span class="status-dot"></span>Martin Online
            </div>
        </div>

        <!-- Dynamic Level of Detail HUD -->
        <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;">
            <div class="hud-row">
                <span class="hud-label">실시간 줌 레벨 (Zoom)</span>
                <span class="hud-value" id="hud-zoom">11.5</span>
            </div>
            <div class="hud-row">
                <span class="hud-label">공간 LOD 레벨</span>
                <span class="lod-badge lod-coarse" id="hud-lod">Coarse Hexagon Mode</span>
            </div>
        </div>

        <div class="divider"></div>

        <div style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #f1f3f9;">쓰레기 핫스팟 오염지수</div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff3366;"></div>
            <span>심각 구역 (Trash Score &ge; 0.7)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff9900;"></div>
            <span>경계 구역 (Trash Score 0.4 ~ 0.7)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #33ccff;"></div>
            <span>관심 구역 (Trash Score &lt; 0.4)</span>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [126.8514, 35.1595], 
            zoom: 11.5,
            minZoom: 8,
            maxZoom: 18
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        map.on('zoom', () => {
            const zoom = map.getZoom().toFixed(2);
            document.getElementById('hud-zoom').innerText = zoom;
            
            const lodBadge = document.getElementById('hud-lod');
            if (zoom < 12.5) {
                lodBadge.innerText = "Coarse Hexagon (Res 7)";
                lodBadge.className = "lod-badge lod-coarse";
            } else if (zoom < 16.8) {
                lodBadge.innerText = "Fine Hexagon (Res 9)";
                lodBadge.className = "lod-badge lod-mid";
            } else {
                lodBadge.innerText = "Ultra-Fine H3 Res 11 Mode";
                lodBadge.className = "lod-badge lod-fine";
            }
        });

        map.on('load', () => {
            map.addSource('hotspots-source', {
                type: 'vector',
                tiles: ['http://54.180.111.192:3000/hotspots/{z}/{x}/{y}'],
                minzoom: 4,
                maxzoom: 17
            });

            // -------------------------------------------------------------
            // [1단계] H3 Resolution 7 (Coarse) 레이어 (줌 4 ~ 12.8)
            // -------------------------------------------------------------
            map.addLayer({
                id: 'hotspots-res7-fill',
                type: 'fill',
                source: 'hotspots-source',
                'source-layer': 'hotspots_res7',
                paint: {
                    'fill-color': [
                        'interpolate',
                        ['linear'],
                        ['get', 'trash_score_avg'],
                        0.0, '#33ccff',
                        0.5, '#ff9900',
                        1.0, '#ff3366'
                    ],
                    'fill-opacity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        12.0, 0.45,
                        12.8, 0.0
                    ]
                }
            });

            map.addLayer({
                id: 'hotspots-res7-border',
                type: 'line',
                source: 'hotspots-source',
                'source-layer': 'hotspots_res7',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.15)',
                    'line-width': 0.8,
                    'line-opacity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        12.0, 0.8,
                        12.8, 0.0
                    ]
                }
            });

            // -------------------------------------------------------------
            // [2단계] H3 Resolution 9 (Fine) 레이어 (줌 12.0 ~ 17.2)
            // -------------------------------------------------------------
            map.addLayer({
                id: 'hotspots-res9-fill',
                type: 'fill',
                source: 'hotspots-source',
                'source-layer': 'hotspots_res9',
                paint: {
                    'fill-color': [
                        'interpolate',
                        ['linear'],
                        ['get', 'trash_score_avg'],
                        0.0, '#33ccff',
                        0.5, '#ff9900',
                        1.0, '#ff3366'
                    ],
                    'fill-opacity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        12.0, 0.0,
                        12.8, 0.60,
                        16.5, 0.60,
                        17.2, 0.0
                    ]
                }
            });

            map.addLayer({
                id: 'hotspots-res9-border',
                type: 'line',
                source: 'hotspots-source',
                'source-layer': 'hotspots_res9',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.25)',
                    'line-width': 1.0,
                    'line-opacity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        12.0, 0.0,
                        12.8, 0.8,
                        16.5, 0.8,
                        17.2, 0.0
                    ]
                }
            });

            // -------------------------------------------------------------
            // [3단계] H3 Resolution 11 (Ultra-Fine) 레이어 (줌 16.5 ~ 18+)
            // -------------------------------------------------------------
            map.addLayer({
                id: 'hotspots-res11-fill',
                type: 'fill',
                source: 'hotspots-source',
                'source-layer': 'hotspots_res11',
                paint: {
                    'fill-color': [
                        'interpolate',
                        ['linear'],
                        ['get', 'trash_score_avg'],
                        0.0, '#33ccff',
                        0.5, '#ff9900',
                        1.0, '#ff3366'
                    ],
                    'fill-opacity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        16.5, 0.0,
                        17.2, 0.55
                    ]
                }
            });

            map.addLayer({
                id: 'hotspots-res11-border',
                type: 'line',
                source: 'hotspots-source',
                'source-layer': 'hotspots_res11',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.0)',
                    'line-width': 0.0,
                    'line-opacity': 0.0
                }
            });

            // -------------------------------------------------------------
            // 마우스 호버 다이내믹 팝업 컨트롤러
            // -------------------------------------------------------------
            const popup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false
            });

            function handleHover(e, title) {
                map.getCanvas().style.cursor = 'pointer';

                if (e.features.length > 0) {
                    const feature = e.features[0];
                    const score = parseFloat(feature.properties.trash_score_avg).toFixed(3);
                    const maxScore = parseFloat(feature.properties.trash_score_max).toFixed(3);
                    const count = feature.properties.cell_count;
                    const html = `
                        <div class="popup-title">${title} Summary</div>
                        <div class="popup-score">${score}</div>
                        <div style="font-size: 11px; color: #9ea4b0; margin-bottom: 4px;">
                            최대 점수: <strong>${maxScore}</strong>
                        </div>
                        <div style="font-size: 11px; color: #727985;">
                            집계 격자 수: <strong>${count}</strong> 개
                        </div>
                    `;

                    popup.setLngLat(e.lngLat)
                        .setHTML(html)
                        .addTo(map);
                }
            }

            function handleLeave() {
                map.getCanvas().style.cursor = '';
                popup.remove();
            }

            map.on('mousemove', 'hotspots-res7-fill', (e) => handleHover(e, 'H3 Res 7 (Coarse)'));
            map.on('mouseleave', 'hotspots-res7-fill', handleLeave);
 
            map.on('mousemove', 'hotspots-res9-fill', (e) => handleHover(e, 'H3 Res 9 (Fine)'));
            map.on('mouseleave', 'hotspots-res9-fill', handleLeave);
 
            map.on('mousemove', 'hotspots-res11-fill', (e) => handleHover(e, 'H3 Res 11 (Ultra-Fine)'));
            map.on('mouseleave', 'hotspots-res11-fill', handleLeave);
        });
    </script>
</body>
</html>
