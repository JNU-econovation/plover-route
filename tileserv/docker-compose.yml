services:
  martin:
    image: ghcr.io/maplibre/martin:1.9.1
    container_name: geoai_martin
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-2}
    entrypoint: /bin/sh
    command: -c "if [ -z \"$$AWS_S3_BUCKET\" ]; then /usr/local/bin/martin $$DATABASE_URL; else /usr/local/bin/martin $$DATABASE_URL https://$$AWS_S3_BUCKET.s3.$$AWS_DEFAULT_REGION.amazonaws.com/hotspots.pmtiles; fi"
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
