version: '3.8'

services:
  route-engine:
    image: ${APP_IMAGE:-route-engine-local:latest}
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: geoai_route_engine
    ports:
      - "8989:8989"
    env_file:
      - .env
    volumes:
      - ./graph-cache:/app/graph-cache
      - ./map-data:/app/map-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3.5G
        reservations:
          memory: 2G
